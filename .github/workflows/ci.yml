name: CI

# Enforcement mechanics decided in specs/adr/0045-repository-workflow-and-ci-enforcement.md;
# gate content specified in specs/testing-strategy.md (CI Gates).
#
# All gates are live as of the first code PR (specs/development-plan.md,
# Phase 0): secret scanning, docs consistency (the ADR-index check; the
# spec-link check was added later by ADR-0061, the markdown style-lint check
# and its config drift-check by ADR-0062), ruff lint+format, pyright
# strict, the 3-OS × Python 3.14 test matrix with the log canary scan, and
# pip-audit (PR step + daily schedule). Tool versions are pinned in the
# `env` block below per testing-strategy.md "Workflow provenance";
# actions are SHA-pinned with version comments (Dependabot maintains those;
# the env-block pins and the gitleaks binary pin are bumped by hand).
#
# `ci-ok` is the aggregate gate: it is the ONLY status check the ruleset
# (.github/rulesets/main-protection.json) requires, so adding/removing/
# path-filtering jobs never requires touching branch protection. New jobs
# must be added to its `needs` list.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * *" # daily pip-audit (ADR-0045 §8); other gates skip on schedule

permissions:
  contents: read

# The event name is part of the group so the daily scheduled run and
# push-to-main runs can never cancel each other (a cancelled scheduled
# pip-audit would send no failure email — the ADR-0045 §8 alert channel).
concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  # Piped stdout on Windows Python 3.14 defaults to the legacy code page
  # (PEP 686 lands in 3.15); without this, the first non-ASCII character a
  # test prints crashes the windows-latest leg with UnicodeEncodeError.
  PYTHONUTF8: "1"
  # Pinned gate-tool versions (testing-strategy.md "Workflow provenance").
  RUFF_VERSION: "0.15.21"
  PYRIGHT_VERSION: "1.1.411"
  PYTEST_VERSION: "9.1.1"
  PYTEST_XDIST_VERSION: "3.8.0"  # windows-latest parallel test leg (ADR-0063)
  PIP_AUDIT_VERSION: "2.10.1"
  PYMARKDOWN_VERSION: "0.9.39"
  UV_VERSION: "0.11.28"

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history — the scan covers every commit, not just the tip

      - name: Install gitleaks 8.30.1 (hash-verified)
        run: |
          curl -sSfL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks

      - name: Scan full git history for committed credentials
        run: ./gitleaks git --no-banner --redact .

  docs-consistency:
    name: Docs consistency (ADR index + spec links + markdown style)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: Check ADR index against files and their Status fields
        run: python3 scripts/check_adr_index.py

      - name: Check every relative markdown link under specs/ resolves
        run: python3 scripts/check_spec_links.py

      - name: Check the two markdown-lint configs stay in sync (ADR-0062)
        run: python3 scripts/check_markdownlint_config_sync.py

      - name: Markdown style lint (PyMarkdown, ADR-0062)
        # Scope (ADR-0062 §4): tracked *.md under specs/ plus root README.md and
        # CLAUDE.md; specs/personal/ is gitignored so git ls-files never lists it
        # (the :(exclude) pathspec guards a hypothetical future tracked file).
        # -z / -0 are null-delimited so a path with spaces stays one argument;
        # xargs -r makes an empty list a clean no-op rather than a zero-path run.
        # Config is the [tool.pymarkdown] block in pyproject.toml, mirrored in
        # .markdownlint.yaml.
        run: |
          git ls-files -z 'specs/*.md' ':(exclude)specs/personal/**' README.md CLAUDE.md \
            | xargs -0 -r uvx "pymarkdownlnt@${PYMARKDOWN_VERSION}" --config pyproject.toml scan

  lint:
    name: Lint and format (ruff)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: ruff check (ruleset in pyproject.toml [tool.ruff.lint])
        run: uvx "ruff@${RUFF_VERSION}" check .

      - name: ruff format --check
        run: uvx "ruff@${RUFF_VERSION}" format --check .

  typecheck:
    name: Strict static typing (pyright)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install project (locked)
        run: uv sync --locked

      - name: pyright --strict (config in pyproject.toml [tool.pyright])
        # pytest rides along so pyright can resolve the test suite's imports
        run: uv run --with "pyright==${PYRIGHT_VERSION}" --with "pytest==${PYTEST_VERSION}" pyright

  test:
    name: Tests (${{ matrix.os }})
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install project (locked)
        run: uv sync --locked

      # Test execution differs by platform (ADR-0063). ubuntu/macos keep the
      # serial run that streams one tee'd stdout/stderr into a single file for
      # the log-canary scan — the proven gate, untouched. windows-latest, the
      # ~3x subprocess-spawn outlier, runs under `pytest -n auto`; the controller
      # stream is tee'd as on the serial legs, and conftest.py's per-worker sink
      # (CANARY_CAPTURE_DIR) adds the captured per-test output xdist suppresses on
      # the controller — together they scan a superset of a serial leg's *captured*
      # stream (out-of-window worker writes are the one exception; ADR-0063). The
      # log-canary rule (no health values in logs) is platform-independent, so
      # the two serial legs remain a full backstop.

      - name: Run tests serially, capturing all output for the canary scan
        id: pytest_serial
        if: matrix.os != 'windows-latest'
        # --capture=tee-sys passes captured test stdout/stderr through to the
        # real streams (pytest's default capture would hide passing tests'
        # output from tee); --log-cli-level surfaces logging-module records.
        # E2E spawned-process capture joins this when E2E tests exist.
        run: |
          uv run --with "pytest==${PYTEST_VERSION}" pytest -v --capture=tee-sys --log-cli-level=DEBUG 2>&1 \
            | tee pytest-output.log

      - name: Log canary scan — serial legs (testing-strategy.md CI Gates)
        # Must run on test FAILURE too — a failing test's traceback is the
        # likeliest place for a leaked value ("scans everything captured").
        if: ${{ !cancelled() && steps.pytest_serial.outcome != 'skipped' }}
        run: uv run python scripts/scan_log_canary.py pytest-output.log

      - name: Run tests in parallel, capturing all output for the canary scan
        id: pytest_parallel
        if: matrix.os == 'windows-latest'
        # -n auto (pytest-xdist) parallelizes across the runner's cores. fd-level
        # capture (pytest's default — no --capture override) records spawned
        # subprocess output, which tee-sys drops once a worker's stdout is the
        # xdist channel. Two sources feed the scan below: the controller's own
        # stdout/stderr, tee'd here like the serial legs (node-id lines, the
        # failures/errors summary with tracebacks, warnings, xdist crash relays);
        # and conftest.py's per-worker sink under CANARY_CAPTURE_DIR, which
        # recovers each passing test's captured output the controller drops.
        # --log-level=DEBUG keeps caplog at the sensitivity the serial legs get
        # from --log-cli-level=DEBUG (live-CLI logging is unsupported under xdist).
        # `shell: bash` (workflow default) runs with pipefail, so a pytest failure
        # still fails the step through the tee.
        env:
          CANARY_CAPTURE_DIR: canary-logs
        run: |
          rm -rf canary-logs   # sweep any stale per-worker files (a differently
                               # sized prior run leaves orphans the scan would read)
          uv run --with "pytest==${PYTEST_VERSION}" --with "pytest-xdist==${PYTEST_XDIST_VERSION}" \
            pytest -v -n auto --log-level=DEBUG 2>&1 | tee parallel-output.log

      - name: Log canary scan — parallel leg (testing-strategy.md CI Gates)
        # Scans the controller stream and every worker capture file. The sink
        # creates worker files lazily, so if capture produced nothing the glob
        # stays literal and scan_log_canary.py exits non-zero — fail-closed.
        if: ${{ !cancelled() && steps.pytest_parallel.outcome != 'skipped' }}
        run: uv run python scripts/scan_log_canary.py parallel-output.log canary-logs/*.log

  pip-audit:
    name: Dependency vulnerability audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: Export locked runtime dependencies
        run: uv export --locked --no-emit-project --format requirements-txt -o requirements-audit.txt

      - name: Audit locked dependencies for known vulnerabilities
        run: uvx "pip-audit@${PIP_AUDIT_VERSION}" -r requirements-audit.txt

  ci-ok:
    name: ci-ok
    needs: [gitleaks, docs-consistency, lint, typecheck, test, pip-audit]
    # Nothing consumes ci-ok on schedule runs (the ruleset gates only PRs);
    # a failing scheduled pip-audit surfaces directly as a failed workflow.
    if: always() && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: All gates passed
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "gate results: $RESULTS"
          for r in $RESULTS; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "a required gate reported '$r'" >&2
              exit 1
            fi
          done
