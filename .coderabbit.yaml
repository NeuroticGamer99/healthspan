# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit configuration for the healthspan project.
# Teaches the reviewer this project's non-obvious conventions (see CLAUDE.md)
# and stands its built-in linters down where CI already gates them.
#
# Sibling reviewer config: .gemini/styleguide.md teaches the same conventions
# to the Antigravity SDK (Gemini) reviewer — a convention added or changed
# here must be mirrored there, and vice versa.

language: en-US

reviews:
  # Solo, spec-heavy project — surface more, including design nits.
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  poem: false
  collapse_walkthrough: false
  changed_files_summary: true

  # Manual/opt-in: each PR spends one deliberately chosen reviewer chain
  # (/coderabbit-review, /copilot-review, or a local /code-review) instead of
  # every bot reviewing every PR. Trigger with an `@coderabbitai review`
  # comment — mechanized as `scripts/bot_review.py request --bot coderabbit`.
  auto_review:
    enabled: false
    drafts: false

  # Exclude generated / data / secret-bearing artifacts from review. All are
  # gitignored, so they normally never reach a diff — but on this PUBLIC repo
  # the exclusion also stops the reviewer from quoting a *force-added* secret
  # or personal record into a public PR comment (CI's gitleaks + log-canary
  # gates are the primary leak guard; this is defense in depth). Globs are
  # any-depth to match how .gitignore ignores these names.
  #
  # specs/personal/ excludes the personal dir *itself*; it does not weaken the
  # path_instructions rule to FLAG personal data that appears ANYWHERE ELSE
  # (outside specs/personal/), which is the case a reviewer can act on.
  path_filters:
    - "!**/*.db"
    - "!**/*.db-shm"
    - "!**/*.db-wal"
    - "!**/*.db.lock"
    - "!**/*.sqlite*"
    - "!**/*recovery-kit*"
    - "!**/exports/**"
    - "!**/export/**"
    - "!**/data/**"
    - "!**/__pycache__/**"
    - "!.venv/**"
    - "!pytest-output.log"
    - "!parallel-output.log"
    - "!canary-logs/**"
    - "!specs/personal/**"

  path_instructions:
    - path: "specs/adr/**"
      instructions: >-
        ADR governance (CLAUDE.md): Accepted ADRs are immutable historical
        records. The only permitted in-place edits to an Accepted ADR are
        correcting its Status field to "Superseded by ADR-XXXX" and adding a
        navigation link in Links. A decision change must be a NEW ADR that
        supersedes the old one; an addition must be a NEW ADR that extends it.
        Flag any content change to an Accepted ADR. Exception (CLAUDE.md rule
        5): fixing a typo or a broken link in an Accepted ADR is permitted
        in place without a new ADR — do not flag those. Any ADR
        add/status/title change must also update the Index table in
        specs/adr/README.md — flag if it does not.

    - path: "specs/**"
      instructions: >-
        Personal-data containment (CLAUDE.md): specs/personal/ is the ONLY
        location for personal health values, lab results, diagnoses,
        medications, clinical history, or the provenance/sequence of the
        owner's actual records. Flag any such content appearing elsewhere in
        specs/ — but report only the path and the data category; never quote,
        copy, or echo the actual values, provenance, or identifying details
        into a review comment (reviews are public). Also flag inline ADR
        status annotations in prose being edited to "chase" a status change —
        those are point-in-time by design.

    - path: "**/*.{py,md,yaml,yml,toml,json}"
      instructions: >-
        Decision-capture routing (CLAUDE.md): design decisions surfaced during
        implementation must be recorded in the owning doc layer in the same
        change — architectural -> new Proposed ADR; API surface ->
        specs/api-reference.md; schema shapes -> specs/data-model.md; config
        knobs/defaults -> owning ADR; deferred questions ->
        specs/open-questions.md. A decision that exists only in code is a spec
        bug. Flag new endpoints, response/error shapes, schema columns, or
        config defaults that have no matching spec/ADR update.

    # Hidden config: the glob above uses dot:false semantics, so `*` does not
    # match dotfiles and `**` does not descend into dot-directories. These
    # literal/explicit-dot entries cover the hidden config that carries
    # decisions today — CI pinned tool versions + gates under .github/, the
    # ADR-0062 markdownlint config, and the Gemini reviewer's styleguide under
    # .gemini/. The reviewer configs (.coderabbit.yaml, .gemini/**) are
    # included only so their OWN carve-out below is applied to them.
    - path: "{.coderabbit.yaml,.markdownlint.yaml,.gemini/**,.github/**}"
      instructions: >-
        Decision-capture routing (CLAUDE.md) for hidden config that has an
        owning ADR or is a CI gate: application config knobs/defaults route to
        the owning ADR (the ADR-0035/0037/0038 pattern for pinned versions and
        defaults; ADR-0062 for the markdownlint gate). Flag changed CI
        tool-version pins, new or altered workflow gates, or defaults tied to an
        owning ADR that have no matching spec/ADR update. Do NOT flag dev-tooling
        or reviewer configuration with no product/API/schema/security contract
        and no blocking CI gate (e.g. .coderabbit.yaml itself, editorconfig):
        per CLAUDE.md the discriminator sends these to rule 6 — code/config is
        its own record and the change's Decisions section reads "none".

    - path: "**/*.py"
      instructions: >-
        Security invariants: flag changes that could touch the invariants
        table in specs/security.md — INV-1 key confinement, INV-2 no plugin
        code in the Core Service, INV-3 plugin-tier credentials, INV-4
        data-only plugin influence, INV-5 named/scoped/revocable credentials,
        INV-6 source-data purity, INV-7 append-only audit surfaces, INV-8
        hash-only credential storage — without a
        corresponding ADR or spec note. Never suggest writing personal health
        values to any path outside specs/personal/. Do NOT write PEP 758
        bare-comma "except A, B:" — always parenthesize exception tuples.

    - path: "**/*.ps1"
      instructions: >-
        PowerShell files must read/write project files with explicit UTF-8.
        For writes, use the BOM-free .NET pattern UTF8Encoding($false) /
        [System.IO.File]::WriteAllText — note "-Encoding UTF8" is NOT BOM-free
        on Windows PowerShell 5.1 (it is on PowerShell 7+). For reads,
        Get-Content -Encoding UTF8 -Raw is fine. The repo contains multibyte
        Unicode (em dashes, box-drawing, arrows) that the default Windows-1252
        encoding corrupts silently. Flag Get-Content -Raw or Set-Content
        without -Encoding UTF8 on project files.

  # CI already gates these (ruff, PyMarkdown/markdownlint per ADR-0062,
  # ADR-index check). Suppress CodeRabbit's duplicate linters so its comments
  # stay on logic and design. github-checks stays on to surface CI results.
  tools:
    ruff:
      enabled: false
    markdownlint:
      enabled: false
    github-checks:
      enabled: true

chat:
  auto_reply: true
